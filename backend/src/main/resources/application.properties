spring.application.name=timbre-backend

# Placeholder defaults; override with env-backed values in later commits.
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=dev
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Spotify OAuth (environment-backed)
spotify.client-id=${SPOTIFY_CLIENT_ID:}
spotify.client-secret=${SPOTIFY_CLIENT_SECRET:}
spotify.redirect-uri=${SPOTIFY_REDIRECT_URI:http://127.0.0.1:5173/callback}

# Spotify endpoints/config
spotify.authorize-url=${SPOTIFY_AUTHORIZE_URL:https://accounts.spotify.com/authorize}
spotify.token-url=${SPOTIFY_TOKEN_URL:https://accounts.spotify.com/api/token}
spotify.api-base-url=${SPOTIFY_API_BASE_URL:https://api.spotify.com/v1}
spotify.scopes=${SPOTIFY_SCOPES:user-read-email,user-read-private,user-top-read,user-read-recently-played,user-read-currently-playing,playlist-modify-private,playlist-modify-public}
